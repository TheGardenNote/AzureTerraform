name: "Pipeline 214 Deploy"
# Ten workflow jest uruchamiany na push do gałęzi main.
on:
  push:
    branches:
      - main
# uruchomi sie za kazdym jak zrobi push
jobs:

  plan:
  # pierwszy job, korzystamy z githubu 2000min agentow miesiecznie, wiec nie musimy sie martwic o kolejke
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    steps:
    # kolejne kroki ktore zrobi job
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: "Terraform Format"
        id: fmt
        run: terraform fmt -check

      - name: "Terraform Init"
        id: init
        run: terraform init
        # Brane z secretow z Github, te zmienne sa potrzebne do autoryzacji do azure, zeby terraform mogl sie zalogowac i wykonac plan
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: "Terraform Validate"
        id: validate
        run: terraform validate -no-color

      - name: "Terraform Plan"
        id: plan
        run: terraform plan -out=tfplan
        # tf plan - plan zostanie zapisany do pliku tfplan, poten do artefaktu
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: "Upload Plan"
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  # ─── JOB 2: APPLY — czeka na manual approval ───
  apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    # trzeba klikac aproved zanim zrobimy apply
    needs: plan
    environment: production  # to środowisko ma required reviewers!
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: "Terraform Init"
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: "Download Plan"
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: "Terraform Apply"
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

# terraform init jest podwojnie w obu jobach, bo kazdy job jest od siebie niezalezny
#  wiec trzeba zainicjalizowac terraform w kazdym z nich, 
# zeby mogl sie zalogowac do azure i wykonac swoje zadania